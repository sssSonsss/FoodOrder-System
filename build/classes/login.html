<!DOCTYPE html>
<html lang="vi" class="auth-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Đăng nhập - FoodOrder</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page-body">
<nav class="navbar">
    <a class="navbar-brand" href="index.html"><div class="logo-icon">🍜</div>FoodOrder</a>
    <ul class="navbar-nav">
        <li><a href="index.html">Trang chủ</a></li>
        <li><a href="menu.html">Thực đơn</a></li>
    </ul>
    <div class="navbar-actions">
        <div class="navbar-icons" id="navbar-icons"></div>
    </div>
</nav>

<section class="auth-wrap">
    <div class="auth-card">
        <h1>Đăng nhập</h1>
        <p class="auth-lead">Dùng tên đăng nhập hoặc email để vào giỏ hàng, voucher và thông báo.</p>
        <div id="auth-error" class="auth-error"></div>
        <form class="auth-form" method="post" action="AuthServlet">
            <input type="hidden" name="action" value="login">
            <input type="hidden" name="redirect" id="redirect" value="/index.html">

            <label for="account">Tên đăng nhập hoặc email</label>
            <input id="account" name="account" required autocomplete="username" placeholder="demo hoặc demo@foodorder.local">

            <label for="password">Mật khẩu</label>
            <input id="password" name="password" type="password" required autocomplete="current-password" placeholder="••••••••">

            <div class="auth-actions">
                <button class="btn btn-primary" type="submit">Đăng nhập</button>
                <a class="btn btn-outline" href="register.html">Tạo tài khoản</a>
            </div>
        </form>
        <p class="auth-demo-note">Tài khoản thử: <strong>demo</strong> / mật khẩu <strong>demo123</strong></p>
    </div>
</section>
<script>
    (function () {
        const params = new URLSearchParams(window.location.search);
        const redir = params.get("redirect");
        if (redir && redir.startsWith("/") && !redir.includes("..")) {
            document.getElementById("redirect").value = redir;
        }
        const err = params.get("error");
        const box = document.getElementById("auth-error");
        const map = {
            credentials: "Sai tên đăng nhập hoặc mật khẩu.",
            missing: "Vui lòng nhập đủ thông tin.",
            invalid: "Yêu cầu không hợp lệ."
        };
        if (err && map[err]) {
            box.textContent = map[err];
            box.classList.add("show");
        }
    })();
</script>
<script src="js/auth-navbar.js"></script>
<script src="js/notification-widget.js?v=3"></script>
</body>
</html>
