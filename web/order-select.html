<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt hàng - FoodOrder</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/order.css">
    <style>
        .select-wrap { max-width: 900px; margin: 0 auto; padding: 30px 5% 64px; }
        .panel { background:#fff; border:1px solid var(--border); border-radius:14px; box-shadow:var(--shadow-sm); padding:16px; }
        .qty { display:flex; align-items:center; gap:8px; justify-content:center; }
        .qty button { width:34px; height:34px; border:1px solid var(--border); border-radius:8px; background:#fff; cursor:pointer; }
        .qty span { min-width:30px; text-align:center; font-weight:700; }
    </style>
</head>
<body>
<nav class="navbar">
    <a class="navbar-brand" href="index.html"><div class="logo-icon">🍜</div>FoodOrder</a>
    <ul class="navbar-nav">
        <li><a href="index.html">Trang chủ</a></li>
        <li><a href="menu.html">Thực đơn</a></li>
    </ul>
    <div class="navbar-actions">
        <div class="navbar-icons" id="navbar-icons"></div>
    </div>
</nav>

<section class="select-wrap">
    <div class="section-header" style="text-align:left;margin-bottom:16px;">
        <div class="section-tag">🛒 Bước 1</div>
        <h2 class="section-title">Đặt hàng</h2>
        <p class="section-desc" style="margin:0;">Chọn số lượng món trước khi chuyển sang bước xác nhận.</p>
    </div>

    <div class="panel">
        <div id="order-item"></div>
        <div style="margin-top:16px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center;">
            <div>
                <div style="color:var(--text-light);font-size:.9rem;">Tạm tính</div>
                <div id="subtotal" style="font-size:1.2rem;font-weight:800;color:var(--primary);">0đ</div>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <a class="btn btn-outline" href="menu.html">Chọn món khác</a>
                <button class="btn btn-primary" onclick="goConfirm()">Tiếp tục xác nhận</button>
            </div>
        </div>
    </div>
</section>

<script>
    const p = new URLSearchParams(window.location.search);
    const foodId = Number(p.get("foodId") || 0);
    let quantity = Math.max(1, Number(p.get("quantity") || 1));
    let currentFood = null;

    function formatMoney(v) {
        return Number(v || 0).toLocaleString("vi-VN") + "đ";
    }

    function render() {
        if (!currentFood) return;
        const wrap = document.getElementById("order-item");
        wrap.innerHTML = `
            <div class="order-flow-item" style="margin-bottom:0;border:0;box-shadow:none;background:transparent;">
                <img class="order-flow-item__img" style="height:200px;border-radius:12px;" src="${currentFood.image_url || 'https://upload.wikimedia.org/wikipedia/commons/6/6d/Ph%E1%BB%9F_b%C3%B2.jpg'}"
                     onerror="this.onerror=null;this.src='https://upload.wikimedia.org/wikipedia/commons/5/5f/B%C3%A1nh_m%C3%AC_th%E1%BB%8Bt_n%C6%B0%E1%BB%9Bng_in_Saigon.jpg'" alt="Món ăn">
                <div class="order-flow-item__body" style="padding-left:0;padding-right:0;">
                    <div class="order-flow-item__name">${currentFood.name || ""}</div>
                    ${currentFood.description ? `<p class="order-flow-item__desc">${currentFood.description}</p>` : ""}
                    <div class="order-flow-item__price">${formatMoney(currentFood.price)}</div>
                    <div class="order-flow-item__row" style="margin-top:14px;">
                        <span class="order-flow-item__meta">Số lượng</span>
                        <div class="qty">
                            <button type="button" onclick="changeQty(-1)">-</button>
                            <span id="qty">${quantity}</span>
                            <button type="button" onclick="changeQty(1)">+</button>
                        </div>
                    </div>
                </div>
            </div>
        `;
        document.getElementById("subtotal").textContent = formatMoney(Number(currentFood.price) * quantity);
    }

    function changeQty(delta) {
        quantity = Math.max(1, quantity + delta);
        render();
    }

    function goConfirm() {
        if (!currentFood) return;
        window.location.href = `checkout.html?foodId=${currentFood.id}&quantity=${quantity}`;
    }

    if (foodId > 0) {
        fetch(`FoodServlet?id=${foodId}`)
            .then(r => r.json())
            .then(food => {
                currentFood = food;
                render();
            })
            .catch(() => {
                document.getElementById("order-item").innerHTML = "<p>Không tải được thông tin món ăn. Vui lòng thử lại.</p>";
            });
    } else {
        document.getElementById("order-item").innerHTML = "<p>Chưa chọn món ăn. Vui lòng quay lại thực đơn.</p>";
    }
</script>
<script src="js/auth-navbar.js"></script>
<script src="js/notification-widget.js?v=3"></script>
</body>
</html>
